spring.application.name=socialgaurd

# ================================
# SERVER
# ================================
server.port=8080

# ================================
# POSTGRESQL DATABASE
# "jdbc" = Java Database Connectivity (the bridge between Java and DB)
# localhost:5432 = your local PostgreSQL running on port 5432
# social_media = database name
# ================================
spring.datasource.url=jdbc:postgresql://localhost:5432/social_media
spring.datasource.username=postgres
spring.datasource.password=postgres_db
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================
# JPA / HIBERNATE
# ddl-auto=update = automatically creates/updates tables from your entities
# show-sql=true = prints SQL queries in console (helpful for learning)
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ================================
# REDIS
# localhost:6379 = Redis default address and port
# ================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ================================
# JWT
# secret = a long random string used to sign tokens (keep this secret!)
# expiration = token expires after 24 hours (in milliseconds)
# ================================
jwt.secret=your-super-secret-key-that-is-very-long-and-secure-please-change-this
jwt.expiration=86400000
